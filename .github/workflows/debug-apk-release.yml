name: Android Github Release

on:
  workflow_dispatch:
  pull_request:
    types: [ closed ]
    branches: [ dev ]

permissions:
  contents: write
  pull-requests: read

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'android_github_release'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Restore debug keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > ~/.android/debug.keystore

      - name: Build self-signed release APK
        run: ./gradlew :androidApp:assembleSelfSignedRelease

      - name: Get vars
        id: vars
        run: |
          # Timestamp-based version (YYYY.MM.DD.HHMM format)
          echo "timestamp=$(date -u +'%Y.%m.%d.%H%M')" >> $GITHUB_OUTPUT

      - name: Create and push Git tag
        id: tag
        run: |
          TAG=debug-${{ steps.vars.outputs.timestamp }}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "🚀 Build ${{ steps.vars.outputs.timestamp }}"
          body: |
            ## Self-Signed Release APK

            ### What's New
            ${{ github.event.pull_request.title || format('Manual build from {0}', github.ref_name) }}

            ${{ github.event.pull_request.body }}

            Signed with the consistent debug keystore, so installing over a previous build does not require uninstall.
          files: |
            androidApp/build/outputs/apk/selfSignedRelease/androidApp-arm64-v8a-selfSignedRelease.apk
          generate_release_notes: true
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
